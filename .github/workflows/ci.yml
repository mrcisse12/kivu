name: KIVU CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (PWA Vite)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: Frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: Frontend/package-lock.json }
      - run: npm install
      - run: npm run build

  backend-node:
    name: Backend Node.js
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: Backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: node -e "require('./src/server.js')" || echo "Server loaded"

  backend-python:
    name: Backend Python (Flask)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: Backend-Python } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: python -m unittest discover tests -v

  android:
    name: Android Compile Check
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: KIVU-Android } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true
